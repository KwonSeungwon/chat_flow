apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "search-service.fullname" . }}
  labels:
    {{- include "search-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "search-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "search-service.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      enableServiceLinks: false
      serviceAccountName: {{ include "search-service.fullname" . }}
      initContainers:
        - name: wait-kafka
          image: busybox
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Waiting for Kafka..."; sleep 5; done']
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.image.registry }}/{{ .Values.global.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.springProfile | quote }}
            # Kafka (외부 Secret)
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.kafka.secretName }}
                  key: KAFKA_BOOTSTRAP_SERVERS
            # Elasticsearch (외부 Secret)
            - name: ELASTICSEARCH_URIS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.elasticsearch.secretName }}
                  key: ELASTICSEARCH_URIS
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.elasticsearch.secretName }}
                  key: ELASTICSEARCH_USERNAME
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.elasticsearch.secretName }}
                  key: ELASTICSEARCH_PASSWORD
            # Valkey (외부 Secret)
            - name: VALKEY_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.valkey.secretName }}
                  key: VALKEY_HOST
            - name: VALKEY_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.valkey.secretName }}
                  key: VALKEY_PORT
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.valkey.secretName }}
                  key: VALKEY_PASSWORD
          envFrom:
            - configMapRef:
                name: {{ include "search-service.fullname" . }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
