# Production Environment Configuration
server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-threads: 30
    accept-count: 20

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # Production PostgreSQL with connection pooling
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Production Valkey Configuration
  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT:6379}
      timeout: 5000ms
      database: 0
      password: ${VALKEY_PASSWORD}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all  # Strongest durability guarantee
      retries: 3
      batch-size: 16384
      linger-ms: 5
      compression-type: snappy
    consumer:
      group-id: chat-service-prod-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "com.chatflow.common.dto"
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
    listener:
      concurrency: 3

chatflow:
  allowed-origins: "https://app.chatflow.ai.kr,https://chatflow.ai.kr"
  file-storage:
    upload-dir: /app/uploads

firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never  # Hide sensitive info in production
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false
    sampling:
      probability: 0.0

logging:
  level:
    com.chatflow: INFO
    org.springframework.web.socket: WARN
    org.hibernate: WARN
    org.apache.kafka: WARN
  pattern:
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/chatflow/chat-service.log
    max-size: 100MB
    max-history: 30