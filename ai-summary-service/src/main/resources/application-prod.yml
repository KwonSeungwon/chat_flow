# AI Summary Service - Production Environment
server:
  port: 8081
  shutdown: graceful
  tomcat:
    max-threads: 20
    accept-count: 10

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ai-summary-service-prod-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "com.chatflow.common.dto"
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 50
    listener:
      concurrency: 3
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 10
      compression-type: snappy

  # Production Valkey Configuration
  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT:6379}
      timeout: 5000ms
      database: 0
      password: ${VALKEY_PASSWORD}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms

  # Spring AI - Google Gemini 설정 (spring-ai 프로필 활성 시)
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.2

# LangChain4J - Google Gemini 설정 (langchain4j 프로필 활성 시)
langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
      model-name: gemini-2.5-flash-lite
      temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false
    sampling:
      probability: 0.0

logging:
  level:
    com.chatflow: INFO
    org.springframework.ai: WARN
    dev.langchain4j: WARN
    org.apache.kafka: WARN
  pattern:
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/chatflow/ai-summary-service.log
    max-size: 100MB
    max-history: 30