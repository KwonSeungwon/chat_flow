events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ──────────────────────────────────────────────
    # HTTP → HTTPS redirect
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name app.chatflow.ai.kr chatflow.ai.kr;

        # Docker healthcheck uses 127.0.0.1 — skip redirect for loopback
        if ($host != "127.0.0.1") {
            return 301 https://$host$request_uri;
        }

        # Loopback healthcheck fallback
        location / {
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }

    # ──────────────────────────────────────────────
    # HTTPS (Cloudflare Origin Certificate)
    # ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name app.chatflow.ai.kr chatflow.ai.kr;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/certs/chatflow.pem;
        ssl_certificate_key /etc/nginx/certs/chatflow.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Gzip 압축
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

        # SPA 라우팅 — index.html 캐시 없음
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # API 프록시
        location /api/ {
            proxy_pass http://gateway-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket 프록시 (SockJS)
        location /ws/ {
            proxy_pass http://gateway-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Native WebSocket 프록시 (Flutter)
        location /ws-native {
            proxy_pass http://gateway-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Android APK 다운로드
        location = /chatflow-app.apk {
            add_header Content-Disposition 'attachment; filename="chatflow-app.apk"';
            add_header Content-Type application/vnd.android.package-archive;
            add_header Cache-Control "no-cache";
        }

        # Flutter 핵심 JS: 항상 재검증
        location ~* ^/(main\.dart\.js|flutter_bootstrap\.js|flutter\.js|flutter_service_worker\.js|version\.json)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Flutter assets/canvaskit: 해시 파일명이라 1년 캐시 안전
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /canvaskit/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 정적 파일
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
