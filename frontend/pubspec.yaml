name: chatflow
description: ChatFlow - Real-time Chat Application
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  dio: ^5.4.3
  # WebSocket / STOMP
  stomp_dart_client: ^2.0.0
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Routing
  go_router: ^14.2.7
  # Secure Storage
  flutter_secure_storage: ^9.2.2
  # Date/Time
  intl: ^0.19.0
  # JSON
  json_annotation: ^4.9.0
  # Environment
  flutter_dotenv: ^5.1.0
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
