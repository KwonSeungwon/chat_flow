name: chatflow
description: ChatFlow - Real-time Chat Application
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  dio: ^5.4.3
  # WebSocket / STOMP
  stomp_dart_client: ^2.0.0
  # State Management
  flutter_riverpod: ^2.5.1
  # Routing
  go_router: ^14.2.7
  # Secure Storage
  flutter_secure_storage: ^9.2.2
  # Date/Time
  intl: ^0.19.0
  # Environment
  flutter_dotenv: ^5.1.0
  # Fonts
  google_fonts: ^6.2.1
  # Icons
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.1.5
  firebase_performance: ^0.10.0+5
  firebase_remote_config: ^5.1.5
  # Local notifications (foreground FCM display)
  flutter_local_notifications: ^18.0.0
  # File picker (Web + Android)
  file_picker: ^8.0.0
  # URL launcher (file download)
  url_launcher: ^6.3.0
  # Preferences storage (non-sensitive, e.g. theme)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/app_icon.png
