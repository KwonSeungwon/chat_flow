server:
  port: 8000

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      routes:
        - id: chat-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=2
        - id: ai-summary-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/ai-summary/**
          filters:
            - StripPrefix=2
        - id: search-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=2
        - id: websocket
          uri: ws://localhost:8080
          predicates:
            - Path=/ws/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.chatflow: DEBUG