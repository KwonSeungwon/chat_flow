# Gateway Service - Production Environment
server:
  port: 8000
  shutdown: graceful
  tomcat:
    max-threads: 300
    accept-count: 200

spring:
  codec:
    max-in-memory-size: 55MB
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      routes:
        - id: chat-service
          uri: ${CHAT_SERVICE_URL}
          predicates:
            - Path=/api/chat/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
        - id: fhir-service
          uri: ${CHAT_SERVICE_URL}
          predicates:
            - Path=/api/fhir/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
        - id: fcm-service
          uri: ${CHAT_SERVICE_URL}
          predicates:
            - Path=/api/fcm/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
        - id: ai-summary-service
          uri: ${AI_SUMMARY_SERVICE_URL}
          predicates:
            - Path=/api/ai-summary/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
        - id: search-service
          uri: ${SEARCH_SERVICE_URL}
          predicates:
            - Path=/api/search/**
          filters:
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
        - id: websocket
          uri: ${CHAT_SERVICE_WS_URL}
          predicates:
            - Path=/ws/**
        - id: websocket-native
          uri: ${CHAT_SERVICE_WS_URL}
          predicates:
            - Path=/ws-native/**
        - id: file-service
          uri: ${CHAT_SERVICE_URL}
          predicates:
            - Path=/api/files/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://*.chatflow.com"
              - "https://chatflow.com"
              - "https://*.chatflow.ai.kr"
              - "https://chatflow.ai.kr"
              - "http://*.chatflow.ai.kr"
              - "http://chatflow.ai.kr"
              - "https://*.tistory.com"
              - "http://43.201.22.86"
              - "http://43.201.22.86:*"
              - "http://43.201.94.100"
              - "http://43.201.94.100:*"
            allowedMethods: 
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            deny-empty-key: false
  
  # Production Valkey Configuration
  data:
    redis:
      host: ${VALKEY_HOST}
      port: ${VALKEY_PORT:6379}
      timeout: 5000ms
      database: 0
      password: ${VALKEY_PASSWORD}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:postgresql}:${DB_PORT:5432}/${DB_NAME:chatflow}
    username: ${DB_USERNAME:chatflow}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false
    sampling:
      probability: 0.0

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 50
        minimum-number-of-calls: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
  timelimiter:
    instances:
      default:
        timeout-duration: 10s

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    org.springframework.cloud.gateway: WARN
    com.chatflow: INFO
    org.springframework.cloud.gateway.filter.ratelimit: INFO
  pattern:
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/chatflow/gateway-service.log
    max-size: 100MB
    max-history: 30