# Docker Compose for Local Development Environment
version: '3.8'

services:
  valkey:
    image: valkey/valkey:7.2-alpine
    hostname: valkey
    container_name: valkey-local
    ports:
      - "6379:6379"
    command: valkey-server --appendonly yes --save 60 1 --loglevel notice
    volumes:
      - valkey_local_data:/data
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka-local
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824  # 1GB
    volumes:
      - kafka_local_data:/var/lib/kafka/data
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper-local
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_local_data:/var/lib/zookeeper/data
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    hostname: elasticsearch
    container_name: elasticsearch-local
    environment:
      - node.name=elasticsearch-local
      - cluster.name=chatflow-local-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_local_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    hostname: kibana
    container_name: kibana-local
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: kibana-local
    networks:
      - chatflow-local

  postgresql:
    image: postgres:16-alpine
    hostname: postgresql
    container_name: postgresql-local
    environment:
      POSTGRES_DB: chatflow_local
      POSTGRES_USER: chatflow
      POSTGRES_PASSWORD: chatflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatflow -d chatflow_local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.47.0
    hostname: prometheus
    container_name: prometheus-local
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_local_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - chatflow-local

  grafana:
    image: grafana/grafana:10.2.0
    hostname: grafana
    container_name: grafana-local
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_local_data:/var/lib/grafana
    networks:
      - chatflow-local

  zipkin:
    image: openzipkin/zipkin:3
    hostname: zipkin
    container_name: zipkin-local
    ports:
      - "9411:9411"
    networks:
      - chatflow-local
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  chatflow-local:
    driver: bridge

volumes:
  valkey_local_data:
  kafka_local_data:
  zookeeper_local_data:
  es_local_data:
  postgres_local_data:
  prometheus_local_data:
  grafana_local_data:
