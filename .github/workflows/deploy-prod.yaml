name: Production Deployment

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/chatflow

permissions:
  contents: read
  packages: write

jobs:
  # --- release 이미지를 production 태그로 retag ---
  retag-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway-service, chat-service, ai-summary-service, search-service, frontend]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image for production
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"

          # release 태그로 먼저 시도, 없으면 hotfix 태그
          if docker pull "${IMAGE}:release-${TAG}" 2>/dev/null; then
            SOURCE_TAG="release-${TAG}"
          elif docker pull "${IMAGE}:hotfix-${TAG}" 2>/dev/null; then
            SOURCE_TAG="hotfix-${TAG}"
          else
            echo "ERROR: No release or hotfix image found for ${TAG}"
            exit 1
          fi

          docker tag "${IMAGE}:${SOURCE_TAG}" "${IMAGE}:${TAG}"
          docker tag "${IMAGE}:${SOURCE_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # --- Production 배포 (approval gate) ---
  deploy-production:
    runs-on: ubuntu-latest
    needs: [retag-images]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Deploy to production
        run: |
          helm dependency update helm/chatflow
          helm upgrade --install chatflow helm/chatflow \
            --namespace chatflow \
            --create-namespace \
            -f helm/chatflow/values-prod.yaml \
            --set global.image.tag=${{ steps.version.outputs.tag }} \
            --set global.image.repository=${{ github.repository_owner }}/chatflow \
            --wait \
            --timeout 15m

      - name: Verify deployment
        run: |
          kubectl -n chatflow get pods -l app.kubernetes.io/part-of=chatflow
          kubectl -n chatflow rollout status deployment/chatflow-gateway-service --timeout=300s
          kubectl -n chatflow rollout status deployment/chatflow-chat-service --timeout=300s
          kubectl -n chatflow rollout status deployment/chatflow-ai-summary-service --timeout=300s
          kubectl -n chatflow rollout status deployment/chatflow-search-service --timeout=300s
          kubectl -n chatflow rollout status deployment/chatflow-frontend --timeout=300s
          echo "Production deployment complete: ${{ steps.version.outputs.tag }}"

      # TODO(human): 배포 실패 시 자동 롤백 전략을 구현하세요
